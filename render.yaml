services:
  - type: web
    name: ecopackai
    env: python
    pythonVersion: 3.10
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecopackai-db
          property: connectionString

databases:
  - name: ecopackai-db
    databaseName: ecopackai
    user: postgres
    plan: free
