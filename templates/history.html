<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>EcoPackAI - History</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8f4);
font-family:'Segoe UI',sans-serif;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-success">

<div class="container">

<a class="navbar-brand" href="/">🌿 EcoPackAI</a>

<ul class="navbar-nav flex-row">

<li class="nav-item me-3">
<a class="nav-link text-white" href="/predict">Recommend</a>
</li>

<li class="nav-item me-3">
<a class="nav-link text-white" href="/history">History</a>
</li>

<li class="nav-item me-3">
<a class="nav-link text-white" href="/profile">Profile</a>
</li>

<li class="nav-item">
<a class="nav-link text-white" href="/">Logout</a>
</li>

</ul>

</div>

</nav>

<div class="container mt-5">

<h2>Recommendation History</h2>

<table class="table table-bordered">

<thead>
<tr>
<th>Product Category</th>
<th>Material</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for row in data %}

<tr>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
<td>{{ row[3] }}</td>

<td>
<a href="/delete_history/{{ row[0] }}" class="btn btn-danger btn-sm">
Delete
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

</table>

</div>

</body>
</html>
