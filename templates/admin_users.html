<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>EcoPackAI - Registered Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8f4);
font-family:'Segoe UI',sans-serif;
}

.card{
border-radius:15px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/admin_dashboard">
⚙ EcoPackAI Admin
</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/admin_dashboard">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/admin_users">Users</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history">Recommendations</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/">Logout</a>
</li>

</ul>

</div>

</nav>

<!-- PAGE -->

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="mb-4">
<i class="fa-solid fa-users"></i> Registered Users
</h3>

<table class="table table-striped table-hover">

<thead class="table-success">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
</tr>

</thead>

<tbody>

{% for u in users %}

<tr>

<td>{{ u[0] }}</td>
<td>{{ u[1] }}</td>
<td>{{ u[2] }}</td>
<td>{{ u[3] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>

</html>
