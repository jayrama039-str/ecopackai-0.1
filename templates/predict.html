<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>EcoPackAI - Packaging Recommender</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
background:linear-gradient(135deg,#e8f5e9,#f1f8f4);
font-family:'Segoe UI',sans-serif;
}

.predict-card{
border-radius:15px;
padding:30px;
}

.form-control{
border-radius:8px;
padding:10px;
}

.btn{
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">

<div class="container">

<a class="navbar-brand" href="/">
🌿 EcoPackAI
</a>

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="/predict">Recommend</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history">History</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/profile">Profile</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/">Logout</a>
</li>

</ul>

</div>

</nav>

<!-- PAGE -->

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card predict-card shadow-lg">

<h3 class="mb-4">

<i class="fa-solid fa-box"></i>
Packaging Recommendation

</h3>

<form action="/predict_result" method="POST">

<div class="row">

<!-- PRODUCT CATEGORY -->

<div class="col-md-6 mb-3">

<label class="form-label">Product Category</label>

<select name="category" class="form-control">

<option>Electronics</option>
<option>Food</option>
<option>Glass</option>
<option>Cosmetics</option>
<option>Clothing</option>

</select>

</div>


<!-- WEIGHT -->

<div class="col-md-6 mb-3">

<label class="form-label">Product Weight (kg)</label>

<input type="number" step="0.1" name="weight" class="form-control" required>

</div>


<!-- FRAGILITY -->

<div class="col-md-6 mb-3">

<label class="form-label">Fragility</label>

<select name="fragility" class="form-control">

<option>Low</option>
<option>Medium</option>
<option>High</option>

</select>

</div>


<!-- DISTANCE -->

<div class="col-md-6 mb-3">

<label class="form-label">Shipping Distance (km)</label>

<input type="number" name="distance" class="form-control" required>

</div>


<!-- DURABILITY -->

<div class="col-md-6 mb-3">

<label class="form-label">Durability Score</label>

<input type="number" step="0.1" name="durability" class="form-control" required>

</div>


<!-- BIODEGRADABILITY -->

<div class="col-md-6 mb-3">

<label class="form-label">Biodegradability Score</label>

<input type="number" step="0.1" name="biodegradability" class="form-control" required>

</div>


<!-- RECYCLABILITY -->

<div class="col-md-6 mb-3">

<label class="form-label">Recyclability Percent</label>

<input type="number" step="0.1" name="recyclability" class="form-control" required>

</div>


<!-- CO2 -->

<div class="col-md-6 mb-3">

<label class="form-label">CO₂ Emission Score</label>

<input type="number" step="0.1" name="co2" class="form-control" required>

</div>

</div>

<div class="mt-3">

<button type="submit" class="btn btn-success">

<i class="fa-solid fa-leaf"></i>
Recommend Packaging

</button>

<button type="reset" class="btn btn-outline-secondary ms-2">

Reset

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
